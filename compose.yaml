services:
  postgres:
    image: postgres:17
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
    environment:
      POSTGRES_DB: bilig
      POSTGRES_USER: bilig
      POSTGRES_PASSWORD: bilig
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U bilig -d bilig
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/01-zero-publication.sql:/docker-entrypoint-initdb.d/01-zero-publication.sql:ro

  local-server:
    build:
      context: .
      target: local-runtime
    environment:
      HOST: 0.0.0.0
      PORT: "4381"
      SYNC_SERVER_URL: http://sync-server:4321
      BILIG_PUBLIC_SERVER_URL: http://localhost:4381
      BILIG_WEB_APP_BASE_URL: http://localhost:3000
      BILIG_CORS_ORIGIN: http://localhost:3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:4381/healthz").then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "4381:4381"

  sync-server:
    build:
      context: .
      target: sync-runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: "4321"
      DATABASE_URL: postgresql://bilig:bilig@postgres:5432/bilig
      BILIG_LOCAL_SERVER_URL: http://local-server:4381
      BILIG_PUBLIC_SERVER_URL: http://localhost:3000
      BILIG_WEB_APP_BASE_URL: http://localhost:3000
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:4321/healthz").then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "4321:4321"

  zero-cache:
    image: rocicorp/zero:1.1.1
    depends_on:
      postgres:
        condition: service_healthy
      sync-server:
        condition: service_healthy
    environment:
      ZERO_PORT: "4848"
      ZERO_REPLICA_FILE: /data/zero.db
      ZERO_ADMIN_PASSWORD: local-zero-admin
      ZERO_APP_PUBLICATIONS: zero_data
      ZERO_UPSTREAM_DB: postgresql://bilig:bilig@postgres:5432/bilig
      ZERO_CVR_DB: postgresql://bilig:bilig@postgres:5432/bilig
      ZERO_CHANGE_DB: postgresql://bilig:bilig@postgres:5432/bilig
      ZERO_QUERY_URL: http://sync-server:4321/api/zero/query
      ZERO_MUTATE_URL: http://sync-server:4321/api/zero/mutate
    ports:
      - "4848:4848"
    volumes:
      - zero-replica-data:/data

  web:
    build:
      context: .
      target: web-runtime
    depends_on:
      sync-server:
        condition: service_healthy
      zero-cache:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:3000/healthz >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    ports:
      - "3000:3000"
    volumes:
      - ./docker/runtime-config.local.json:/usr/share/nginx/html/runtime-config.json:ro

volumes:
  postgres-data:
  zero-replica-data:

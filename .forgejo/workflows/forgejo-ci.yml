name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: strict-verify
    runs-on: docker
    timeout-minutes: 20
    container:
      image: docker.io/library/node:24.14.0-bookworm
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify Node baseline
        run: |
          set -euo pipefail
          node -e 'const [major, minor, patch] = process.versions.node.split(".").map(Number); if (major < 24 || (major === 24 && (minor < 14 || (minor === 14 && patch < 0)))) { console.error(`Node ${process.versions.node} is below the required 24.14.0 baseline`); process.exit(1); }'

      - name: Enable pnpm via Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run strict repository CI
        run: |
          set -euo pipefail
          corepack enable
          pnpm run ci

      - name: Ensure tracked files stay clean
        run: |
          set -euo pipefail
          git diff --exit-code

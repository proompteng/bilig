      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Download Chromium runtime artifact
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: bilig-playwright-runtime
          path: artifacts/playwright-runtime

      - name: Restore Chromium runtime
        run: |
          set -eu
          mkdir -p "$HOME/.cache"
          rm -rf "$HOME/.cache/ms-playwright"
          cp -R artifacts/playwright-runtime/ms-playwright "$HOME/.cache/ms-playwright"

      - name: Install Chromium system dependencies
        run: |
          set -eu
          pnpm exec playwright install-deps chromium

      - name: Run browser fuzz CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          bun scripts/run-browser-tests.ts --grep @fuzz-browser

      - name: Upload browser fuzz artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-fuzz-browser-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-coverage:
    name: strict-verify-coverage
    runs-on: docker
    needs:
      - verify-fuzz-unit
      - verify-fuzz-browser-test
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run coverage CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm coverage
          bun scripts/coverage-contracts.ts

      - name: Upload coverage artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-coverage-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-bench:
    name: strict-verify-bench
    runs-on: docker
    needs:
      - verify-coverage
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run bench and release CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm bench:smoke
          CI=1 pnpm bench:contracts
          pnpm release:check
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload bench artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-bench-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-browser:
    name: strict-verify-browser
    runs-on: docker
    needs:
      - verify-bench
      - verify-browser-runtime
    timeout-minutes: 30
    env:
      CI: "true"
      BILIG_E2E_STARTUP_TIMEOUT_MS: "600000"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack

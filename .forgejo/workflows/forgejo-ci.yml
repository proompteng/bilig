name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-static:
    name: strict-verify-static
    runs-on: docker
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run static repository CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm protocol:check
          pnpm formula-inventory:check
          pnpm naming:check
          pnpm lint
          pnpm wasm:build
          pnpm typecheck
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload static artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-static-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-fuzz-unit:
    name: strict-verify-fuzz-unit
    runs-on: docker
    needs:
      - verify-static
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run unit fuzz CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          python3 - <<'PY'
          import pathlib
          import subprocess
          import sys

          roots = [pathlib.Path("packages"), pathlib.Path("apps")]
          fuzz_files = sorted(
            str(path)
            for root in roots
            if root.exists()
            for path in root.rglob("*.fuzz.test.ts")
          )
          if not fuzz_files:
            print("No fuzz test files found", file=sys.stderr)
            raise SystemExit(1)
          subprocess.check_call(
            ["pnpm", "exec", "vitest", "run", *fuzz_files],
            env={
              **dict(__import__("os").environ),
              "BILIG_FUZZ_PROFILE": "main",
              "BILIG_FUZZ_CAPTURE": "1",
            },
          )
          PY

      - name: Upload unit fuzz artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-fuzz-unit-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-browser:
    name: strict-verify-browser
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    needs:
      - verify-static
      - verify-fuzz-unit
    timeout-minutes: 45
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
      BILIG_BROWSER_STACK: "local"
      BILIG_DEV_DISABLE_COMPOSE: "1"
      BILIG_E2E_REMOTE_SYNC: "0"
      BILIG_E2E_STARTUP_TIMEOUT_MS: "600000"
      BILIG_FUZZ_PROFILE: "main"
      BILIG_FUZZ_CAPTURE: "1"
      BILIG_FUZZ_BROWSER: "1"
      BILIG_FUZZ_MAX_MS: "120000"
      BILIG_FUZZ_NUM_RUNS: "1"
      BILIG_FUZZ_SEED: "2128392860"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Build local browser stack packages
        run: |
          set -eu
          pnpm --filter @bilig/app... --filter @bilig/web... build

      - name: Run browser CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm test:browser

      - name: Upload browser artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-browser-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-final:
    name: strict-verify-final
    runs-on: docker
    needs:
      - verify-browser
    timeout-minutes: 30
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run coverage, bench, and release CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm coverage
          bun scripts/coverage-contracts.ts
          pnpm bench:smoke
          CI=1 pnpm bench:contracts
          pnpm release:check
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload final artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-final-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: strict-verify
    runs-on: bilig-ci
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Run strict repository CI
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH)=' || true

          node --version
          node -e 'const [major, minor, patch] = process.versions.node.split(".").map(Number); if (major < 24 || (major === 24 && (minor < 11 || (minor === 11 && patch < 1)))) { console.error(`Node ${process.versions.node} is below the required 24.11.1 baseline`); process.exit(1); }'

          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
          pnpm run ci
          git diff --exit-code

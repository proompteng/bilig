name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: strict-verify
    runs-on: docker
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
      BILIG_BROWSER_STACK: "compose"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install Docker Compose client for browser stack
        run: |
          set -eu
          apt-get update
          apt-get install -y --no-install-recommends docker.io docker-compose
          docker --version
          docker-compose version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for browser smoke
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Run strict repository CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm run ci

      - name: Upload fuzz and browser artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-fuzz-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Ensure tracked files stay clean
        run: |
          set -eu
          git diff --exit-code

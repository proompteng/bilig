name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-static:
    name: strict-verify-static
    runs-on: docker
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run static repository CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm protocol:check
          pnpm formula-inventory:check
          pnpm naming:check
          pnpm lint
          pnpm wasm:build
          pnpm typecheck

      - name: Upload static artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-static-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Ensure tracked files stay clean
        run: |
          set -eu
          git diff --exit-code

  verify-fuzz:
    name: strict-verify-fuzz
    runs-on: docker
    needs:
      - verify-static
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for test verify
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Verify Docker Compose environment
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is required on the Forgejo docker runner"
            exit 1
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose version
          else
            apt-get update
            apt-get install -y --no-install-recommends docker-compose
            docker-compose version
          fi

          docker --version
          docker info

      - name: Run fuzz CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm test:fuzz:main

      - name: Upload fuzz artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-fuzz-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-coverage:
    name: strict-verify-coverage
    runs-on: docker
    needs:
      - verify-fuzz
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run coverage CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm coverage
          bun scripts/coverage-contracts.ts

      - name: Upload coverage artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-coverage-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-bench:
    name: strict-verify-bench
    runs-on: docker
    needs:
      - verify-coverage
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run bench and release CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm bench:smoke
          CI=1 pnpm bench:contracts
          pnpm release:check
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload bench artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-bench-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-browser:
    name: strict-verify-browser
    runs-on: docker
    needs:
      - verify-bench
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BROWSER_STACK: "compose"
      BILIG_E2E_STARTUP_TIMEOUT_MS: "300000"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for browser smoke
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Verify Docker Compose environment
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker is required on the Forgejo docker runner"
            exit 1
          fi

          if docker compose version >/dev/null 2>&1; then
            docker compose version
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose version
          else
            apt-get update
            apt-get install -y --no-install-recommends docker-compose
            docker-compose version
          fi

          docker --version
          docker info

      - name: Run browser CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm test:browser

      - name: Upload browser artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-browser-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

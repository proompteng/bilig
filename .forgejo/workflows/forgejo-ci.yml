      - name: Restore Chromium runtime
        run: |
          set -eu
          mkdir -p "$HOME/.cache"
          rm -rf "$HOME/.cache/ms-playwright"
          cp -R artifacts/playwright-runtime/ms-playwright "$HOME/.cache/ms-playwright"

      - name: Install Chromium system dependencies
        run: |
          set -eu
          pnpm exec playwright install-deps chromium

      - name: Run browser CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm test:browser

      - name: Upload browser artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-browser-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

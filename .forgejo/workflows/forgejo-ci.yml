name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  core-ci:
    name: Core Repository CI
    runs-on: docker
    timeout-minutes: 35
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '1.5'
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install Bun
        run: |
          set -eu
          npm install -g bun
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run core repository CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm run ci:core

      - name: Upload core artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-core-ci-artifacts
          path: |
            artifacts/fuzz
            coverage
            test-results
          if-no-files-found: ignore

  browser-e2e:
    name: Browser E2E
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 35
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '1.5'
      BILIG_BROWSER_INCLUDE_PERF: '0'
      BILIG_BROWSER_INCLUDE_FUZZ: '0'
      BILIG_BROWSER_STACK: 'local'
      BILIG_DEV_DISABLE_COMPOSE: '1'
      BILIG_E2E_REMOTE_SYNC: '0'
      BILIG_E2E_STARTUP_TIMEOUT_MS: '600000'
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install Bun
        run: |
          set -eu
          npm install -g bun
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run browser CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm run ci:browser

      - name: Upload browser artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-browser-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

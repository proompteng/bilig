name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  static-checks:
    name: Static Checks
    runs-on: docker
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          npm install -g bun
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run static repository CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm protocol:check
          pnpm formula-inventory:check
          pnpm naming:check
          pnpm lint
          pnpm wasm:build
          pnpm typecheck
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload static artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-static-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  unit-quality:
    name: Unit, Coverage, and Perf
    runs-on: docker
    needs:
      - static-checks
    timeout-minutes: 45
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          if [ -n "${GITHUB_PATH:-}" ]; then
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
          fi
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run unit CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm wasm:build
          pnpm coverage
          bun scripts/coverage-contracts.ts
          pnpm bench:smoke
          CI=1 pnpm bench:contracts
          git diff --exit-code
          git diff --cached --exit-code

      - name: Upload unit artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-unit-artifacts
          path: |
            test-results
          if-no-files-found: ignore

  browser-e2e:
    name: Browser E2E
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    needs:
      - static-checks
      - unit-quality
    timeout-minutes: 45
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
      BILIG_BROWSER_STACK: "local"
      BILIG_DEV_DISABLE_COMPOSE: "1"
      BILIG_E2E_REMOTE_SYNC: "0"
      BILIG_E2E_STARTUP_TIMEOUT_MS: "600000"
      BILIG_FUZZ_PROFILE: "main"
      BILIG_FUZZ_CAPTURE: "1"
      BILIG_FUZZ_BROWSER: "1"
      BILIG_FUZZ_MAX_MS: "120000"
      BILIG_FUZZ_NUM_RUNS: "1"
      BILIG_FUZZ_SEED: "2128392860"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          npm install -g bun
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Build local browser stack packages
        run: |
          set -eu
          pnpm --filter @bilig/app... --filter @bilig/web... build

      - name: Check release asset budgets
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm release:check

      - name: Run browser CI
        run: |
          set -eu
          pnpm test:browser

      - name: Upload browser artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-browser-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

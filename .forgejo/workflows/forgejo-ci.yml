name: forgejo-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-static:
    name: strict-verify-static
    runs-on: docker
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run static repository CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm protocol:check
          pnpm formula-inventory:check
          pnpm naming:check
          pnpm lint
          pnpm wasm:build
          pnpm typecheck

      - name: Upload static artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-static-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Ensure tracked files stay clean
        run: |
          set -eu
          git diff --exit-code

  verify-fuzz-unit:
    name: strict-verify-fuzz-unit
    runs-on: docker
    needs:
      - verify-static
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run unit fuzz CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          python3 - <<'PY'
          import pathlib
          import subprocess
          import sys

          roots = [pathlib.Path("packages"), pathlib.Path("apps")]
          fuzz_files = sorted(
            str(path)
            for root in roots
            if root.exists()
            for path in root.rglob("*.fuzz.test.ts")
          )
          if not fuzz_files:
            print("No fuzz test files found", file=sys.stderr)
            raise SystemExit(1)
          subprocess.check_call(
            ["pnpm", "exec", "vitest", "run", *fuzz_files],
            env={
              **dict(__import__("os").environ),
              "BILIG_FUZZ_PROFILE": "main",
              "BILIG_FUZZ_CAPTURE": "1",
            },
          )
          PY

      - name: Upload unit fuzz artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-fuzz-unit-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-browser-runtime:
    name: strict-verify-browser-runtime
    runs-on: docker
    needs:
      - verify-static
    timeout-minutes: 20
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium runtime
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Stage Chromium runtime artifact
        run: |
          set -eu
          rm -rf artifacts/playwright-runtime
          mkdir -p artifacts/playwright-runtime
          cp -R "$HOME/.cache/ms-playwright" artifacts/playwright-runtime/ms-playwright

      - name: Upload Chromium runtime artifact
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-playwright-runtime
          path: artifacts/playwright-runtime
          if-no-files-found: error

  verify-fuzz-browser:
    name: strict-verify-fuzz-browser-stack
    runs-on: docker
    needs:
      - verify-static
      - verify-browser-runtime
    timeout-minutes: 30
    env:
      CI: "true"
      BILIG_BROWSER_STACK: "local"
      BILIG_BENCH_TOLERANCE: "1.5"
      BILIG_DEV_DISABLE_COMPOSE: "1"
      BILIG_E2E_REMOTE_SYNC: "0"
      BILIG_E2E_STARTUP_TIMEOUT_MS: "600000"
      BILIG_FUZZ_PROFILE: "main"
      BILIG_FUZZ_CAPTURE: "1"
      BILIG_FUZZ_BROWSER: "1"
      BILIG_FUZZ_MAX_MS: "120000"
      BILIG_FUZZ_NUM_RUNS: "1"
      BILIG_FUZZ_SEED: "2128392860"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu
          uname -a
          pwd
          env | sort | grep -E '^(CI|FORGEJO|GITEA|RUNNER|HOME|SHELL|PATH|BILIG_)=' || true

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          pnpm --version
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Download Chromium runtime artifact
        uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: bilig-playwright-runtime
          path: artifacts/playwright-runtime

      - name: Restore Chromium runtime
        run: |
          set -eu
          mkdir -p "$HOME/.cache"
          rm -rf "$HOME/.cache/ms-playwright"
          cp -R artifacts/playwright-runtime/ms-playwright "$HOME/.cache/ms-playwright"

      - name: Install Chromium system dependencies
        run: |
          set -eu
          pnpm exec playwright install-deps chromium

      - name: Probe browser stack CI
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          bun scripts/run-browser-tests.ts --list --grep @fuzz-browser

      - name: Upload browser stack artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-fuzz-browser-stack-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  verify-fuzz-browser-test:
    name: strict-verify-fuzz-browser
    runs-on: docker
    needs:
      - verify-static
      - verify-browser-runtime
      - verify-fuzz-browser
    timeout-minutes: 30
    env:
      CI: "true"
      BILIG_BROWSER_STACK: "local"
      BILIG_BENCH_TOLERANCE: "1.5"
      BILIG_DEV_DISABLE_COMPOSE: "1"
      BILIG_E2E_REMOTE_SYNC: "0"
      BILIG_E2E_STARTUP_TIMEOUT_MS: "600000"
      BILIG_FUZZ_PROFILE: "main"
      BILIG_FUZZ_CAPTURE: "1"
      BILIG_FUZZ_BROWSER: "1"
      BILIG_FUZZ_MAX_MS: "120000"
      BILIG_FUZZ_NUM_RUNS: "1"
      BILIG_FUZZ_SEED: "2128392860"
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Log runner environment
        run: |
          set -eu

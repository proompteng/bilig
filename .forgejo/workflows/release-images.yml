name: forgejo-release-images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.ide-newton.ts.net
  IMAGE_NAMESPACE: lab

jobs:
  correctness-deep:
    name: manual-deep-correctness
    runs-on: docker
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '1.5'
      BILIG_BROWSER_STACK: 'local'
      BILIG_DEV_DISABLE_COMPOSE: '1'
      BILIG_E2E_REMOTE_SYNC: '0'
      BILIG_E2E_STARTUP_TIMEOUT_MS: '600000'
      BILIG_FUZZ_PROFILE: 'main'
      BILIG_FUZZ_CAPTURE: '1'
      BILIG_FUZZ_BROWSER: '1'
      BILIG_FUZZ_MAX_MS: '120000'
      BILIG_FUZZ_NUM_RUNS: '1'
      BILIG_FUZZ_SEED: '2128392860'
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          npm install -g bun
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run deep correctness gate
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm run ci:full

      - name: Upload deep correctness artifacts on failure
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-release-correctness-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

  build-app-amd64:
    name: build-bilig-app-amd64
    runs-on: docker
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Verify amd64 Docker environment
        run: |
          set -euxo pipefail
          docker version
          docker info
          test "$(uname -m)" = "x86_64"

      - name: Resolve image tags
        id: meta
        run: |
          set -eu
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 image
        run: |
          set -euxo pipefail

          IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/bilig-app"
          SHA="${{ steps.meta.outputs.sha }}"
          ARCH_TAG="${IMAGE}:${SHA}-amd64"

          docker build \
            --file ./Dockerfile \
            --target bilig-runtime \
            --tag "$ARCH_TAG" \
            .

          docker push "$ARCH_TAG"

  build-app-arm64:
    name: build-bilig-app-arm64
    runs-on: docker-arm64
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Verify arm64 Docker environment
        run: |
          set -euxo pipefail
          docker version
          docker info
          case "$(uname -m)" in
            aarch64|arm64)
              ;;
            *)
              echo "Expected arm64 runner, got $(uname -m)"
              exit 1
              ;;
          esac

      - name: Resolve image tags
        id: meta
        run: |
          set -eu
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push arm64 image
        run: |
          set -euxo pipefail

          IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/bilig-app"
          SHA="${{ steps.meta.outputs.sha }}"
          ARCH_TAG="${IMAGE}:${SHA}-arm64"

          docker build \
            --file ./Dockerfile \
            --target bilig-runtime \
            --tag "$ARCH_TAG" \
            .

          docker push "$ARCH_TAG"

  publish-manifests:
    name: publish-multiarch-manifests
    needs:
      - build-app-amd64
      - build-app-arm64
    runs-on: docker
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Verify Docker environment
        run: |
          set -euxo pipefail
          docker version
          docker info

      - name: Resolve image tags
        id: meta
        run: |
          set -eu
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Determine latest-tag ownership
        id: head
        run: |
          set -eu
          git fetch --depth=1 origin main

          SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"

          if [ "$SHA" = "$MAIN_SHA" ]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish multi-arch image tags
        run: |
          set -euxo pipefail

          IMAGE="${REGISTRY}/${IMAGE_NAMESPACE}/bilig-app"
          SHA="${{ steps.meta.outputs.sha }}"
          SHORT_SHA="${{ steps.meta.outputs.short_sha }}"
          PUBLISH_LATEST="${{ steps.head.outputs.publish_latest }}"
          SOURCE_AMD64="${IMAGE}:${SHA}-amd64"
          SOURCE_ARM64="${IMAGE}:${SHA}-arm64"

          publish_tag() {
            TARGET_TAG="$1"
            docker manifest create "$TARGET_TAG" "$SOURCE_AMD64" "$SOURCE_ARM64"
            docker manifest annotate "$TARGET_TAG" "$SOURCE_AMD64" --os linux --arch amd64
            docker manifest annotate "$TARGET_TAG" "$SOURCE_ARM64" --os linux --arch arm64
            docker manifest push "$TARGET_TAG"
            docker manifest inspect "$TARGET_TAG" >/dev/null
          }

          publish_tag "${IMAGE}:${SHA}"
          publish_tag "${IMAGE}:${SHORT_SHA}"

          if [ "$PUBLISH_LATEST" = "true" ]; then
            publish_tag "${IMAGE}:latest"
          fi

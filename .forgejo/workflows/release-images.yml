name: forgejo-release-images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.ide-newton.ts.net
  IMAGE_NAMESPACE: lab
  IMAGE_PLATFORM: linux/arm64

jobs:
  build-and-push:
    runs-on: bilig-ci
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v4

      - name: Bootstrap Docker
        run: |
          set -euxo pipefail

          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          elif command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          if ! command -v docker >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              ${SUDO} apt-get update
              DEBIAN_FRONTEND=noninteractive ${SUDO} apt-get install -y docker.io docker-buildx || \
                DEBIAN_FRONTEND=noninteractive ${SUDO} apt-get install -y docker.io
            else
              echo "docker is not installed and apt-get is unavailable"
              exit 1
            fi
          fi

          if ! docker info >/dev/null 2>&1; then
            if command -v systemctl >/dev/null 2>&1; then
              ${SUDO} systemctl start docker || true
            fi
          fi

          if ! docker info >/dev/null 2>&1; then
            ${SUDO} sh -lc 'nohup dockerd >/tmp/dockerd.log 2>&1 &' || true
            for _ in $(seq 1 30); do
              docker info >/dev/null 2>&1 && break
              sleep 1
            done
          fi

          docker info >/dev/null 2>&1 || {
            cat /tmp/dockerd.log || true
            exit 1
          }

          docker version
          docker buildx version

      - name: Enable buildx
        run: |
          set -eu
          docker buildx inspect bilig-buildx >/dev/null 2>&1 || docker buildx create --name bilig-buildx --use
          docker buildx use bilig-buildx

      - name: Build and push bilig-web
        run: |
          set -eu
          SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          docker buildx build \
            --platform "$IMAGE_PLATFORM" \
            --file ./Dockerfile \
            --target web-runtime \
            --push \
            --tag "$REGISTRY/$IMAGE_NAMESPACE/bilig-web:$SHA" \
            --tag "$REGISTRY/$IMAGE_NAMESPACE/bilig-web:$SHORT_SHA" \
            --tag "$REGISTRY/$IMAGE_NAMESPACE/bilig-web:latest" \
            .

      - name: Build and push bilig-sync
        run: |
          set -eu
          SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          docker buildx build \
            --platform "$IMAGE_PLATFORM" \
            --file ./Dockerfile \
            --target sync-runtime \
            --push \
            --tag "$REGISTRY/$IMAGE_NAMESPACE/bilig-sync:$SHA" \
            --tag "$REGISTRY/$IMAGE_NAMESPACE/bilig-sync:$SHORT_SHA" \
            --tag "$REGISTRY/$IMAGE_NAMESPACE/bilig-sync:latest" \
            .

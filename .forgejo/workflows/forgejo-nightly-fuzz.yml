name: forgejo-nightly-correctness

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  nightly-correctness:
    name: nightly-correctness
    runs-on: docker
    timeout-minutes: 45
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '1.5'
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          npm install -g bun
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run deep correctness gate
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm run ci:full

      - name: Upload nightly correctness artifacts
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        with:
          name: bilig-nightly-correctness-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

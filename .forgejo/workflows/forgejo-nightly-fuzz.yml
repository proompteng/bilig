name: forgejo-nightly-fuzz

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  nightly-fuzz:
    name: nightly-fuzz
    runs-on: docker
    timeout-minutes: 45
    container:
      image: docker.io/library/node:24-bookworm
      options: --add-host=host.docker.internal:host-gateway
    env:
      CI: "true"
      BILIG_E2E_HOST: host.docker.internal
    steps:
      - name: Checkout
        uses: https://data.forgejo.org/actions/checkout@v6.0.2

      - name: Verify Node baseline
        run: |
          set -eu
          node --version
          node -e "const [major] = process.versions.node.split('.').map(Number); if (major < 24) { console.error(\`Node \${process.versions.node} is below the required 24.x baseline\`); process.exit(1); }"

      - name: Enable pnpm via Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install latest Bun
        run: |
          set -eu
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for nightly browser fuzz
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Run nightly fuzz campaign
        run: |
          set -eu
          export PATH="$HOME/.bun/bin:$PATH"
          pnpm test:fuzz:nightly

      - name: Upload nightly fuzz artifacts
        if: failure()
        uses: https://data.forgejo.org/actions/upload-artifact@v4
        with:
          name: bilig-nightly-fuzz-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

name: github-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: verify-node-${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: "22"
            bench_tolerance: "5"
          - node: "24.11.1"
            bench_tolerance: "1.5"
    env:
      BILIG_BENCH_TOLERANCE: ${{ matrix.bench_tolerance }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run repository CI
        run: |
          set -eu
          pnpm run ci

      - name: Ensure tracked files stay clean
        run: |
          set -eu
          git diff --exit-code

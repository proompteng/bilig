name: github-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  runtime-commit-policy:
    name: runtime-commit-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Validate runtime release commit policy
        run: |
          set -eu
          pnpm runtime:commit-policy

  verify:
    name: verify-node-24
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: runtime-commit-policy
    env:
      CI: "true"
      BILIG_BENCH_TOLERANCE: "1.5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run medium correctness gate
        run: |
          set -eu
          pnpm test:correctness:medium

      - name: Run repository CI
        run: |
          set -eu
          pnpm run ci

      - name: Upload fuzz and browser artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bilig-fuzz-artifacts-node-24
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Ensure tracked files stay clean
        run: |
          set -eu
          git diff --exit-code

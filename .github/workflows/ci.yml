name: github-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-commit-policy:
    name: runtime-commit-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.10'

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Validate runtime release commit policy
        run: |
          set -eu
          pnpm runtime:commit-policy

  verify:
    name: verify-node-24
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: runtime-commit-policy
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '1.5'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.10'

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install generated asset renderer
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          rsvg-convert --version

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Run repository CI
        run: |
          set -eu
          pnpm run ci

      - name: Upload fuzz and browser artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bilig-fuzz-artifacts-node-24
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Ensure tracked files stay clean
        run: |
          set -eu
          git diff --exit-code

name: OpenSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '26 11 * * 1'
  workflow_dispatch:

jobs:
  publish:
    name: publish-scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Publish OpenSSF Scorecard result
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: true

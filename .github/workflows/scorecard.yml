name: OpenSSF Scorecard

on:
  push:
    branches:
      - main
  schedule:
    - cron: '26 11 * * 1'
  workflow_dispatch:

jobs:
  publish:
    name: publish-scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Publish OpenSSF Scorecard result
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: true

  code-scanning:
    name: scorecard-code-scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard SARIF
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload Scorecard SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: openssf-scorecard-results
          path: scorecard-results.sarif
          if-no-files-found: error

      - name: Upload Scorecard results to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif

name: release-images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.ide-newton.ts.net
  IMAGE_NAMESPACE: lab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push bilig-web
        uses: docker://gcr.io/kaniko-project/executor:v1.23.2-debug
        with:
          args: >-
            --context=${{ github.workspace }}
            --dockerfile=${{ github.workspace }}/Dockerfile
            --target=web-runtime
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bilig-web:${{ steps.meta.outputs.sha }}
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bilig-web:${{ steps.meta.outputs.short_sha }}
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bilig-web:latest

      - name: Build and push bilig-sync
        uses: docker://gcr.io/kaniko-project/executor:v1.23.2-debug
        with:
          args: >-
            --context=${{ github.workspace }}
            --dockerfile=${{ github.workspace }}/Dockerfile
            --target=sync-runtime
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bilig-sync:${{ steps.meta.outputs.sha }}
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bilig-sync:${{ steps.meta.outputs.short_sha }}
            --destination=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/bilig-sync:latest

name: release-images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: registry.ide-newton.ts.net
  IMAGE_NAMESPACE: lab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      INTERNAL_REGISTRY_USERNAME: ${{ secrets.INTERNAL_REGISTRY_USERNAME }}
      INTERNAL_REGISTRY_PASSWORD: ${{ secrets.INTERNAL_REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: bilig-web
            target: web-runtime
          - image_name: bilig-sync
            target: sync-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skip publish when registry secrets are not configured
        if: ${{ env.INTERNAL_REGISTRY_USERNAME == '' || env.INTERNAL_REGISTRY_PASSWORD == '' }}
        run: |
          echo "Internal registry credentials are not configured for this repository."
          echo "Skipping image publication; local/manual release remains available."

      - name: Log in to internal registry
        if: ${{ env.INTERNAL_REGISTRY_USERNAME != '' && env.INTERNAL_REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.INTERNAL_REGISTRY_USERNAME }}
          password: ${{ env.INTERNAL_REGISTRY_PASSWORD }}

      - name: Build and push
        if: ${{ env.INTERNAL_REGISTRY_USERNAME != '' && env.INTERNAL_REGISTRY_PASSWORD != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}:latest

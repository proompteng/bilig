name: create-bilig-workpaper-package

on:
  push:
    branches:
      - main
    paths:
      - 'packages/create-workpaper/**'
      - 'docs/create-bilig-workpaper.md'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/check-create-workpaper-package.ts'
      - 'scripts/run-ci.ts'
      - 'scripts/__tests__/create-workpaper-package-workflow.test.ts'
      - '.github/workflows/create-workpaper-package.yml'
  pull_request:
    paths:
      - 'packages/create-workpaper/**'
      - 'docs/create-bilig-workpaper.md'
      - 'README.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/check-create-workpaper-package.ts'
      - 'scripts/run-ci.ts'
      - 'scripts/__tests__/create-workpaper-package-workflow.test.ts'
      - '.github/workflows/create-workpaper-package.yml'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm dist-tag for create-bilig-workpaper'
        type: string
        required: false
        default: latest
      dry_run:
        description: 'Run npm publish --dry-run instead of releasing'
        type: boolean
        required: false
        default: false
      allow_new_package:
        description: 'Attempt first-time package creation when create-bilig-workpaper is not provisioned yet'
        type: boolean
        required: false
        default: false

concurrency:
  group: create-workpaper-package-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: verify-create-workpaper-package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.10'

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Verify create package manifest and tarball
        run: |
          set -euo pipefail
          pnpm create-workpaper:check

      - name: Smoke generated starter against public @bilig/headless
        run: |
          set -euo pipefail
          rm -rf .cache/create-workpaper-ci
          node packages/create-workpaper/bin/create-bilig-workpaper.js .cache/create-workpaper-ci
          cd .cache/create-workpaper-ci
          npm install --ignore-scripts
          npm run typecheck
          npm run smoke

      - name: Upload create package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: create-bilig-workpaper-package
          path: build/create-workpaper-package/*.tgz
          if-no-files-found: error

  publish:
    name: publish-create-workpaper-package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write
    env:
      NPM_DIST_TAG: ${{ github.event.inputs.npm_tag || 'latest' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      ALLOW_NEW_PACKAGE: ${{ github.event.inputs.allow_new_package || 'false' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node.js 24 for npm trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: |
          set -euo pipefail
          npm install --global npm@latest
          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const version = process.argv[2] ?? ''
          const [major, minor, patch] = version.split('.').map(Number)
          if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) {
            throw new Error(`npm ${version} is too old for trusted publishing; expected >=11.5.1`)
          }
          NODE

      - name: Publish or update create package dist-tag
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./packages/create-workpaper/package.json').name")"
          package_version="$(node -p "require('./packages/create-workpaper/package.json').version")"
          npm_tag="${NPM_DIST_TAG:-latest}"
          dry_run="${DRY_RUN:-false}"
          allow_new="${ALLOW_NEW_PACKAGE:-false}"

          published_version="$(npm view "${package_name}@${package_version}" version --json 2>/dev/null || true)"
          if [ "$published_version" = "\"${package_version}\"" ]; then
            tagged_version="$(npm view "${package_name}@${npm_tag}" version --json 2>/dev/null || true)"
            if [ "$tagged_version" = "\"${package_version}\"" ]; then
              echo "${package_name}@${package_version} is already published on dist-tag ${npm_tag}."
              exit 0
            fi
            if [ "$dry_run" = "true" ]; then
              echo "Would add dist-tag ${npm_tag} to ${package_name}@${package_version}."
              exit 0
            fi
            npm dist-tag add "${package_name}@${package_version}" "$npm_tag"
            exit 0
          fi

          if [ "$allow_new" != "true" ] && [ "$dry_run" != "true" ]; then
            {
              echo "create-bilig-workpaper is not published yet."
              echo "Configure npm trusted publishing for this workflow, then run workflow_dispatch with allow_new_package=true."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Skipping first-time publish until allow_new_package=true is explicitly set."
            exit 0
          fi

          publish_args=(./packages/create-workpaper --tag "$npm_tag" --access public --provenance)
          if [ "$dry_run" = "true" ]; then
            publish_args+=(--dry-run)
          fi
          npm publish "${publish_args[@]}"

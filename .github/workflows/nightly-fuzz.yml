name: github-nightly-correctness

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-correctness:
    name: nightly-correctness
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: 'true'
      BILIG_BENCH_TOLERANCE: '2.5'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24.11.1'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for deep correctness gate
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Run deep correctness gate
        run: |
          set -eu
          pnpm test:correctness:deep

      - name: Upload nightly correctness artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: bilig-nightly-correctness-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

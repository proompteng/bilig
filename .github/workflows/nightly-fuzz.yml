name: github-nightly-fuzz

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  nightly-fuzz:
    name: nightly-fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.11.1"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Enable Corepack
        run: |
          set -eu
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -eu
          pnpm install --frozen-lockfile

      - name: Install Chromium for nightly browser fuzz
        run: |
          set -eu
          pnpm exec playwright install --with-deps chromium

      - name: Run nightly fuzz campaign
        run: |
          set -eu
          pnpm test:fuzz:nightly

      - name: Upload nightly fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bilig-nightly-fuzz-artifacts
          path: |
            artifacts/fuzz
            playwright-report
            test-results
          if-no-files-found: ignore

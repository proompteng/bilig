name: bilig-runtime-packages

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'packages/headless/**'
      - 'packages/core/**'
      - 'packages/formula/**'
      - 'packages/protocol/**'
      - 'packages/workbook-domain/**'
      - 'packages/wasm-kernel/**'
      - 'packages/excel-import/**'
      - 'packages/bilig/**'
      - 'packages/workpaper/**'
      - 'packages/create-workpaper/**'
      - 'packages/xlsx-formula-recalc/**'
      - 'packages/bilig-xlsx-formula-recalc/**'
      - 'packages/sheetjs-formula-recalc/**'
      - 'packages/bilig-sheetjs-formula-recalc/**'
      - 'packages/exceljs-formula-recalc/**'
      - 'packages/bilig-exceljs-formula-recalc/**'
      - 'packages/benchmarks/**'
      - 'packages/headless/CHANGELOG.md'
      - 'docs/public-api.md'
      - 'docs/runtime-semantic-release-program-2026-04-16.md'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/check-package-publish.ts'
      - 'scripts/check-runtime-commit-policy.ts'
      - 'scripts/gen-formula-dominance-snapshot.ts'
      - 'scripts/gen-workpaper-benchmark-baseline.ts'
      - 'scripts/gen-workpaper-hyperformula-audit.ts'
      - 'scripts/gen-workpaper-vs-hyperformula-benchmark.ts'
      - 'scripts/gen-workpaper-vs-hyperformula-expanded-benchmark.ts'
      - 'scripts/next-runtime-release-version.ts'
      - 'scripts/plan-runtime-release.ts'
      - 'scripts/check-runtime-npm-provisioning.ts'
      - 'scripts/check-create-workpaper-package.ts'
      - 'scripts/publish-runtime-package-set.ts'
      - 'scripts/runtime-package-set.ts'
      - 'scripts/runtime-release.ts'
      - 'scripts/sync-runtime-package-versions.ts'
      - 'scripts/sync-runtime-release-metadata.ts'
      - 'scripts/workpaper-external-smoke.ts'
      - 'scripts/workpaper-surface-contract.ts'
      - 'integrations/n8n-nodes-workpaper/**'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - 'tsconfig.workspace-paths.json'
      - 'workspace-resolution.generated.json'
      - '.github/workflows/headless-package.yml'
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm dist-tag (latest, beta, next, etc.)'
        type: string
        required: false
        default: latest
      dry_run:
        description: 'Run npm publish in dry-run mode instead of releasing'
        type: boolean
        required: false
        default: false
      allow_new_packages:
        description: 'Attempt first-time npm package creation when the package name is not already provisioned'
        type: boolean
        required: false
        default: false
      skip_unprovisioned_packages:
        description: 'Publish provisioned packages and skip unprovisioned leaf packages that still need first-time npm creation'
        type: boolean
        required: false
        default: false
      release_from_github_mirror:
        description: 'Deprecated: plan against GitHub mirror only; publishing still requires Forgejo canonical refs'
        type: boolean
        required: false
        default: false
      target_version:
        description: 'Optional explicit runtime package version to release'
        type: string
        required: false
        default: ''
      publish_n8n_node:
        description: 'Publish @bilig/n8n-nodes-workpaper from this trusted workflow'
        type: boolean
        required: false
        default: false
      publish_runtime_packages:
        description: 'Plan and publish runtime packages during manual dispatch'
        type: boolean
        required: false
        default: true

concurrency:
  # Isolate push runs by commit so a newer push cannot cancel an already-started
  # trusted publish. The release alignment gate still prevents stale runs from
  # publishing after main has moved.
  group: runtime-packages-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.sha }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: verify-runtime-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.10'

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Check workspace resolution metadata
        run: |
          set -euo pipefail
          pnpm workspace-resolution:check

      - name: Build runtime package chain
        run: |
          set -euo pipefail
          pnpm --filter @bilig/protocol build
          pnpm --filter @bilig/workbook-domain build
          pnpm --filter @bilig/wasm-kernel build
          pnpm --filter @bilig/formula build
          pnpm --filter @bilig/core build
          pnpm --filter @bilig/excel-import build
          pnpm --filter @bilig/headless build
          pnpm --filter bilig-workpaper build
          pnpm --filter @bilig/workpaper build
          pnpm --filter xlsx-formula-recalc build
          pnpm --filter @bilig/xlsx-formula-recalc build
          pnpm --filter sheetjs-formula-recalc build
          pnpm --filter @bilig/sheetjs-formula-recalc build
          pnpm --filter exceljs-formula-recalc build
          pnpm --filter @bilig/exceljs-formula-recalc build

      - name: Lint runtime package sources
        run: |
          set -euo pipefail
          pnpm exec oxlint --config .oxlintrc.json --type-aware --deny-warnings packages/headless/src packages/excel-import/src packages/bilig/src

      - name: Run import and headless parity tests
        run: |
          set -euo pipefail
          pnpm exec vitest run \
            packages/excel-import/src/__tests__/structured-reference-import.test.ts \
            packages/headless/src/__tests__/work-paper.test.ts \
            packages/headless/src/__tests__/work-paper-runtime.test.ts \
            packages/headless/src/__tests__/work-paper-parity.test.ts \
            packages/headless/src/__tests__/workpaper-formula-regressions.test.ts \
            packages/headless/src/__tests__/workpaper-version-surface.test.ts \
            packages/headless/src/__tests__/sum-formula-members.test.ts \
            packages/headless/src/__tests__/sumifs-wildcard-arithmetic.test.ts \
            packages/headless/src/__tests__/xlookup-decimal-exact-match.test.ts \
            packages/headless/src/__tests__/persistence.test.ts \
            packages/headless/src/__tests__/persistence.fuzz.test.ts \
            packages/headless/src/__tests__/hyperformula-surface-parity.test.ts \
            packages/bilig/src/__tests__/bilig-alias.test.ts \
            packages/exceljs-formula-recalc/src/__tests__/exceljs-formula-recalc.test.ts \
            scripts/__tests__/runtime-package-publish-validation.test.ts

      - name: Validate publishable runtime package set
        run: |
          set -euo pipefail
          pnpm publish:runtime:check

      - name: Check WorkPaper benchmark baseline shape
        run: |
          set -euo pipefail
          pnpm workpaper:bench:check

      - name: Check formula dominance snapshot
        run: |
          set -euo pipefail
          pnpm formula:dominance:check

      - name: Check WorkPaper competitive benchmark artifact shape
        run: |
          set -euo pipefail
          pnpm workpaper:bench:competitive:check

      - name: Run WorkPaper external-consumer smoke test
        run: |
          set -euo pipefail
          pnpm workpaper:smoke:external

      - name: Verify n8n community node package
        run: |
          set -euo pipefail
          cd integrations/n8n-nodes-workpaper
          npm ci
          npm run check

      - name: Set up Node.js 22 compatibility runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: Enable Corepack for Node.js 22 compatibility runtime
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Run Node.js 22 headless compatibility smoke test
        run: |
          set -euo pipefail
          node scripts/headless-node22-smoke.mjs

      - name: Pack runtime package set
        run: |
          set -euo pipefail
          rm -rf build/npm-packages-runtime
          mkdir -p build/npm-packages-runtime

          package_dirs=(
            packages/protocol
            packages/workbook-domain
            packages/wasm-kernel
            packages/formula
            packages/core
            packages/excel-import
            packages/headless
            packages/bilig
            packages/workpaper
            packages/xlsx-formula-recalc
            packages/bilig-xlsx-formula-recalc
            packages/sheetjs-formula-recalc
            packages/bilig-sheetjs-formula-recalc
            packages/exceljs-formula-recalc
            packages/bilig-exceljs-formula-recalc
            packages/create-workpaper
          )

          for package_dir in "${package_dirs[@]}"; do
            package_name="$(node -e "const fs = require('node:fs'); process.stdout.write(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).name)" "$package_dir/package.json")"
            encoded_package_name="$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$package_name")"
            package_pack_dir="$GITHUB_WORKSPACE/build/npm-packages-runtime/${encoded_package_name}"
            mkdir -p "$package_pack_dir"
            (
              cd "$package_dir"
              pnpm pack --pack-destination "$package_pack_dir"
            )
          done

      - name: Upload packed runtime artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: bilig-runtime-packages
          path: build/npm-packages-runtime/**/*.tgz
          if-no-files-found: error

  plan_release:
    name: plan-runtime-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    if: github.ref == 'refs/heads/main' && (github.event_name != 'workflow_dispatch' || github.event.inputs.publish_runtime_packages != 'false')
    outputs:
      release_needed: ${{ steps.planner.outputs.release_needed }}
      bootstrap_required: ${{ steps.planner.outputs.bootstrap_required }}
      manual_override: ${{ steps.planner.outputs.manual_override }}
      release_type: ${{ steps.planner.outputs.release_type }}
      reason: ${{ steps.planner.outputs.reason }}
      manifest_version: ${{ steps.planner.outputs.manifest_version }}
      published_version: ${{ steps.planner.outputs.published_version }}
      last_tag: ${{ steps.planner.outputs.last_tag }}
      target_version: ${{ steps.planner.outputs.target_version }}
      tag_name: ${{ steps.planner.outputs.tag_name }}
      npm_tag: ${{ steps.release_meta.outputs.npm_tag }}
      dry_run: ${{ steps.release_meta.outputs.dry_run }}
      allow_new_packages: ${{ steps.release_meta.outputs.allow_new_packages }}
      skip_unprovisioned_packages: ${{ steps.release_meta.outputs.skip_unprovisioned_packages }}
      release_from_github_mirror: ${{ steps.release_meta.outputs.release_from_github_mirror }}
      planner_args: ${{ steps.release_meta.outputs.planner_args }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.10'

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Derive release invocation settings
        id: release_meta
        env:
          INPUT_NPM_TAG: ${{ github.event.inputs.npm_tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_ALLOW_NEW_PACKAGES: ${{ github.event.inputs.allow_new_packages }}
          INPUT_SKIP_UNPROVISIONED_PACKAGES: ${{ github.event.inputs.skip_unprovisioned_packages }}
          INPUT_RELEASE_FROM_GITHUB_MIRROR: ${{ github.event.inputs.release_from_github_mirror }}
          INPUT_TARGET_VERSION: ${{ github.event.inputs.target_version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            npm_tag_input="latest"
            dry_run_input="false"
            allow_new_packages_input="false"
            skip_unprovisioned_packages_input="false"
            release_from_github_mirror_input="false"
          else
            npm_tag_input="${INPUT_NPM_TAG:-latest}"
            dry_run_input="${INPUT_DRY_RUN:-false}"
            allow_new_packages_input="${INPUT_ALLOW_NEW_PACKAGES:-false}"
            skip_unprovisioned_packages_input="${INPUT_SKIP_UNPROVISIONED_PACKAGES:-false}"
            release_from_github_mirror_input="${INPUT_RELEASE_FROM_GITHUB_MIRROR:-false}"
          fi

          case "$dry_run_input" in
            true|True|TRUE) dry_run_value=true ;;
            false|False|FALSE|"") dry_run_value=false ;;
            *)
              echo 'dry_run input must be true or false' >&2
              exit 1
              ;;
          esac

          case "$allow_new_packages_input" in
            true|True|TRUE) allow_new_packages_value=true ;;
            false|False|FALSE|"") allow_new_packages_value=false ;;
            *)
              echo 'allow_new_packages input must be true or false' >&2
              exit 1
              ;;
          esac

          case "$skip_unprovisioned_packages_input" in
            true|True|TRUE) skip_unprovisioned_packages_value=true ;;
            false|False|FALSE|"") skip_unprovisioned_packages_value=false ;;
            *)
              echo 'skip_unprovisioned_packages input must be true or false' >&2
              exit 1
              ;;
          esac

          case "$release_from_github_mirror_input" in
            true|True|TRUE) release_from_github_mirror_value=true ;;
            false|False|FALSE|"") release_from_github_mirror_value=false ;;
            *)
              echo 'release_from_github_mirror input must be true or false' >&2
              exit 1
              ;;
          esac

          planner_args=""
          if [[ -n "${INPUT_TARGET_VERSION:-}" ]]; then
            planner_args="--release-as ${INPUT_TARGET_VERSION} --allow-untagged-baseline"
          fi
          if [[ "${allow_new_packages_value}" == "true" ]]; then
            planner_args="${planner_args:+${planner_args} }--allow-new-npm-packages"
          fi
          if [[ "${skip_unprovisioned_packages_value}" == "true" ]]; then
            planner_args="${planner_args:+${planner_args} }--skip-unprovisioned-packages"
          fi
          if [[ "${dry_run_value}" == "true" ]]; then
            planner_args="${planner_args:+${planner_args} }--dry-run"
          fi

          {
            echo "npm_tag=$npm_tag_input"
            echo "dry_run=$dry_run_value"
            echo "allow_new_packages=$allow_new_packages_value"
            echo "skip_unprovisioned_packages=$skip_unprovisioned_packages_value"
            echo "release_from_github_mirror=$release_from_github_mirror_value"
            echo "planner_args=$planner_args"
          } >> "$GITHUB_OUTPUT"

      - name: Configure canonical release remotes
        id: release_remotes
        env:
          FORGEJO_PUSH_URL: ${{ secrets.FORGEJO_PUSH_URL }}
          RELEASE_FROM_GITHUB_MIRROR: ${{ steps.release_meta.outputs.release_from_github_mirror }}
        run: |
          set -euo pipefail

          skip_release_planning() {
            local reason="$1"
            {
              echo "ready=false"
              echo "reason=${reason}"
            } >> "$GITHUB_OUTPUT"
            {
              echo "### runtime release planning skipped"
              echo
              echo "${reason}."
              echo
              echo "The runtime package verification job still ran; only the release planning/publish path is disabled for this mirror."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }

          if [[ "${RELEASE_FROM_GITHUB_MIRROR}" == "true" ]]; then
            git remote rename origin github
            git remote add origin "$(git remote get-url github)"

            while read -r tag; do
              [[ -n "$tag" ]] || continue
              git tag -d "$tag"
            done < <(git tag --list 'libraries-v*')

            if ! git fetch --force origin main; then
              skip_release_planning "GitHub mirror main could not be fetched; runtime release planning skipped after verification"
            fi
            if ! git fetch --force origin 'refs/tags/libraries-v*:refs/tags/libraries-v*'; then
              skip_release_planning "GitHub mirror runtime tags could not be fetched; runtime release planning skipped after verification"
            fi

            {
              echo "ready=true"
              echo "reason="
            } >> "$GITHUB_OUTPUT"
            {
              echo "### runtime release planning using GitHub mirror"
              echo
              echo "Forgejo canonical release refs are unavailable; this manual run will plan against GitHub main and GitHub runtime tags."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ -z "${FORGEJO_PUSH_URL:-}" ]]; then
            skip_release_planning "FORGEJO_PUSH_URL secret is not configured; runtime release planning skipped after verification"
          fi

          git remote rename origin github
          git remote add origin "${FORGEJO_PUSH_URL}"

          while read -r tag; do
            [[ -n "$tag" ]] || continue
            git tag -d "$tag"
          done < <(git tag --list 'libraries-v*')

          if ! git fetch --force origin main; then
            skip_release_planning "canonical Forgejo main could not be fetched; runtime release planning skipped after verification"
          fi
          if ! git fetch --force origin 'refs/tags/libraries-v*:refs/tags/libraries-v*'; then
            skip_release_planning "canonical Forgejo runtime tags could not be fetched; runtime release planning skipped after verification"
          fi
          if ! git fetch --force github main; then
            skip_release_planning "GitHub mirror main could not be fetched; runtime release planning skipped after verification"
          fi

          {
            echo "ready=true"
            echo "reason="
          } >> "$GITHUB_OUTPUT"

      - name: Validate Forgejo and GitHub branch alignment
        id: release_alignment
        env:
          RELEASE_REMOTES_READY: ${{ steps.release_remotes.outputs.ready }}
          RELEASE_REMOTES_REASON: ${{ steps.release_remotes.outputs.reason }}
        run: |
          set -euo pipefail

          if [[ "${RELEASE_REMOTES_READY}" != "true" ]]; then
            {
              echo "current=false"
              echo "reason=${RELEASE_REMOTES_REASON:-runtime release remotes were not configured}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          origin_sha="$(git rev-parse origin/main)"
          github_sha="$(git rev-parse github/main)"

          echo "Forgejo main: ${origin_sha}"
          echo "GitHub main: ${github_sha}"
          echo "Workflow SHA: ${GITHUB_SHA}"

          test "${origin_sha}" = "${github_sha}"

          if [[ "${origin_sha}" != "${GITHUB_SHA}" ]]; then
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "reason=stale workflow SHA; newer main exists" >> "$GITHUB_OUTPUT"
            {
              echo "### runtime release planning skipped"
              echo
              echo "A newer main commit exists, so this stale workflow run will not plan or publish runtime packages."
              echo
              echo "- workflow SHA: ${GITHUB_SHA}"
              echo "- current main: ${origin_sha}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "current=true" >> "$GITHUB_OUTPUT"
          echo "reason=" >> "$GITHUB_OUTPUT"

      - name: Plan runtime release
        id: planner
        run: |
          set -euo pipefail

          if [[ "${RELEASE_ALIGNMENT_CURRENT}" != "true" ]]; then
            release_skip_reason="${RELEASE_ALIGNMENT_REASON:-stale workflow SHA; newer main exists}"
            {
              echo "release_needed=false"
              echo "bootstrap_required=false"
              echo "manual_override=false"
              echo "release_type=none"
              echo "reason=${release_skip_reason}"
              echo "manifest_version="
              echo "published_version="
              echo "last_tag="
              echo "target_version="
              echo "tag_name="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p build
          if [[ -n "${PLANNER_ARGS}" ]]; then
            # shellcheck disable=SC2206
            planner_args=(${PLANNER_ARGS})
          else
            planner_args=()
          fi

          bun scripts/plan-runtime-release.ts \
            "${planner_args[@]}" \
            --notes-file build/runtime-release-notes.md \
            --github-output "$GITHUB_OUTPUT"
        env:
          RELEASE_ALIGNMENT_CURRENT: ${{ steps.release_alignment.outputs.current }}
          RELEASE_ALIGNMENT_REASON: ${{ steps.release_alignment.outputs.reason }}
          PLANNER_ARGS: ${{ steps.release_meta.outputs.planner_args }}

  publish_release:
    name: publish-runtime-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - verify
      - plan_release
    if: github.ref == 'refs/heads/main' && needs.plan_release.outputs.release_needed == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: |
          set -euo pipefail
          required_npm_version="11.9.0"
          current_npm_version="$(npm --version)"

          if node - "$current_npm_version" "$required_npm_version" <<'NODE'
          const [current, required] = process.argv.slice(2);
          const parse = (version) => version.split('.').map((part) => Number.parseInt(part, 10));
          const [currentMajor, currentMinor, currentPatch] = parse(current);
          const [requiredMajor, requiredMinor, requiredPatch] = parse(required);
          const currentParts = [currentMajor, currentMinor, currentPatch];
          const requiredParts = [requiredMajor, requiredMinor, requiredPatch];
          for (let index = 0; index < requiredParts.length; index += 1) {
            if (currentParts[index] > requiredParts[index]) {
              process.exit(0);
            }
            if (currentParts[index] < requiredParts[index]) {
              process.exit(1);
            }
          }
          process.exit(0);
          NODE
          then
            echo "npm ${current_npm_version} satisfies trusted publishing minimum ${required_npm_version}"
          else
            echo "npm ${current_npm_version} is below trusted publishing minimum ${required_npm_version}; installing ${required_npm_version}"
            npm config set fetch-retries 5
            npm config set fetch-retry-factor 2
            npm config set fetch-retry-mintimeout 20000
            npm config set fetch-retry-maxtimeout 120000
            npm install -g "npm@${required_npm_version}"
          fi

          npm --version

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: '1.3.10'

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Configure canonical release remotes
        env:
          FORGEJO_PUSH_URL: ${{ secrets.FORGEJO_PUSH_URL }}
          RELEASE_FROM_GITHUB_MIRROR: ${{ needs.plan_release.outputs.release_from_github_mirror }}
        run: |
          set -euo pipefail

          if [[ "${RELEASE_FROM_GITHUB_MIRROR}" == "true" ]]; then
            echo "Runtime release publishing from GitHub mirror is disabled." >&2
            echo "Forgejo origin is the canonical release remote; fix Forgejo access instead of pushing release commits to GitHub." >&2
            exit 1
          fi

          if [[ -z "${FORGEJO_PUSH_URL:-}" ]]; then
            echo "FORGEJO_PUSH_URL secret is required for runtime publishing" >&2
            exit 1
          fi

          git remote rename origin github
          git remote add origin "${FORGEJO_PUSH_URL}"

          while read -r tag; do
            [[ -n "$tag" ]] || continue
            git tag -d "$tag"
          done < <(git tag --list 'libraries-v*')

          git fetch --force origin main
          git fetch --force origin 'refs/tags/libraries-v*:refs/tags/libraries-v*'
          git fetch --force github main

      - name: Validate Forgejo and GitHub branch alignment
        run: |
          set -euo pipefail

          origin_sha="$(git rev-parse origin/main)"
          github_sha="$(git rev-parse github/main)"

          echo "Forgejo main: ${origin_sha}"
          echo "GitHub main: ${github_sha}"
          echo "Workflow SHA: ${GITHUB_SHA}"

          test "${origin_sha}" = "${github_sha}"
          test "${origin_sha}" = "${GITHUB_SHA}"

      - name: Regenerate release notes
        run: |
          set -euo pipefail

          mkdir -p build
          if [[ -n "${PLANNER_ARGS}" ]]; then
            # shellcheck disable=SC2206
            planner_args=(${PLANNER_ARGS})
          else
            planner_args=()
          fi

          bun scripts/plan-runtime-release.ts \
            "${planner_args[@]}" \
            --notes-file build/runtime-release-notes.md >/tmp/runtime-release-plan.json
        env:
          PLANNER_ARGS: ${{ needs.plan_release.outputs.planner_args }}

      - name: Confirm package version baseline
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const packagePaths = [
            'packages/protocol/package.json',
            'packages/workbook-domain/package.json',
            'packages/wasm-kernel/package.json',
            'packages/formula/package.json',
            'packages/core/package.json',
            'packages/excel-import/package.json',
            'packages/headless/package.json',
            'packages/bilig/package.json',
            'packages/workpaper/package.json',
            'packages/xlsx-formula-recalc/package.json',
            'packages/bilig-xlsx-formula-recalc/package.json',
            'packages/sheetjs-formula-recalc/package.json',
            'packages/bilig-sheetjs-formula-recalc/package.json',
            'packages/exceljs-formula-recalc/package.json',
            'packages/bilig-exceljs-formula-recalc/package.json',
            'packages/create-workpaper/package.json',
          ];
          const packages = packagePaths.map((packagePath) =>
            JSON.parse(fs.readFileSync(packagePath, 'utf8')),
          );
          const versions = [...new Set(packages.map((pkg) => pkg.version))];
          if (versions.length !== 1) {
            throw new Error(
              `Runtime packages must share one version: ${packages
                .map((pkg) => `${pkg.name}@${pkg.version}`)
                .join(', ')}`,
            );
          }
          console.log(`Repository runtime package manifest baseline v${versions[0]}`);
          NODE

      - name: Sync and commit runtime release metadata
        env:
          TARGET_VERSION: ${{ needs.plan_release.outputs.target_version }}
          DRY_RUN: ${{ needs.plan_release.outputs.dry_run }}
        run: |
          set -euo pipefail

          if [[ -z "${TARGET_VERSION}" ]]; then
            echo "Target runtime package version is required" >&2
            exit 1
          fi

          bun scripts/sync-runtime-release-metadata.ts \
            --version "${TARGET_VERSION}" \
            --notes-file build/runtime-release-notes.md

          bun scripts/sync-public-evidence.ts
          bun scripts/sync-agent-discovery-docs.ts

          release_paths=(
            .release-please-manifest.json
            docs
            docs/headless-package-footprint.json
            docs/public-evidence.json
            README.md
            packages/protocol/package.json
            packages/workbook-domain/package.json
            packages/wasm-kernel/package.json
            packages/formula/package.json
            packages/core/package.json
            packages/excel-import/package.json
            packages/headless/package.json
            packages/bilig/package.json
            packages/workpaper/package.json
            packages/xlsx-formula-recalc/package.json
            packages/bilig-xlsx-formula-recalc/package.json
            packages/sheetjs-formula-recalc/package.json
            packages/bilig-sheetjs-formula-recalc/package.json
            packages/exceljs-formula-recalc/package.json
            packages/bilig-exceljs-formula-recalc/package.json
            packages/create-workpaper/package.json
            packages/headless/AGENTS.md
            packages/headless/server.json
            packages/headless/SKILL.md
            packages/headless/README.md
            packages/bilig/AGENTS.md
            packages/bilig/SKILL.md
            packages/bilig/README.md
            packages/workpaper/AGENTS.md
            packages/workpaper/SKILL.md
            packages/workpaper/README.md
            packages/xlsx-formula-recalc/AGENTS.md
            packages/xlsx-formula-recalc/SKILL.md
            packages/xlsx-formula-recalc/README.md
            packages/bilig-xlsx-formula-recalc/README.md
            packages/sheetjs-formula-recalc/AGENTS.md
            packages/sheetjs-formula-recalc/SKILL.md
            packages/sheetjs-formula-recalc/README.md
            packages/bilig-sheetjs-formula-recalc/README.md
            packages/exceljs-formula-recalc/AGENTS.md
            packages/exceljs-formula-recalc/SKILL.md
            packages/exceljs-formula-recalc/README.md
            packages/bilig-exceljs-formula-recalc/README.md
            packages/headless/CHANGELOG.md
            skills/bilig-workpaper/SKILL.md
          )

          if [[ "${DRY_RUN}" == "true" ]]; then
            git diff --stat -- "${release_paths[@]}" || true
            exit 0
          fi

          if git diff --quiet -- "${release_paths[@]}"; then
            echo "Runtime release metadata is already at ${TARGET_VERSION}"
            exit 0
          fi

          # The release metadata commit runs repository git hooks. Type-aware lint
          # resolves workspace packages through package exports, so a clean
          # runner needs runtime d.ts outputs rebuilt after the version sync and
          # before pushing.
          pnpm --filter @bilig/protocol build
          pnpm --filter @bilig/workbook-domain build
          pnpm --filter @bilig/wasm-kernel build
          pnpm --filter @bilig/formula build
          pnpm --filter @bilig/core build
          pnpm --filter @bilig/headless build
          pnpm --filter bilig-workpaper build
          pnpm --filter @bilig/workpaper build
          pnpm --filter xlsx-formula-recalc build
          pnpm --filter @bilig/xlsx-formula-recalc build
          pnpm --filter sheetjs-formula-recalc build
          pnpm --filter @bilig/sheetjs-formula-recalc build
          pnpm --filter exceljs-formula-recalc build
          pnpm --filter @bilig/exceljs-formula-recalc build

          bun scripts/sync-headless-package-footprint.ts

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${release_paths[@]}"
          git commit -m "chore(release): runtime packages v${TARGET_VERSION}"

          for attempt in 1 2 3; do
            if SKIP_SIMPLE_GIT_HOOKS=1 git push origin HEAD:main; then
              break
            fi
            if [[ "${attempt}" == "3" ]]; then
              echo "Failed to push release metadata after ${attempt} attempts" >&2
              exit 1
            fi

            echo "Release metadata push raced with a newer main; rebasing attempt ${attempt}"
            git fetch --force origin main
            git rebase origin/main
          done

          for attempt in $(seq 1 30); do
            git fetch --force github main
            if [[ "$(git rev-parse github/main)" == "$(git rev-parse HEAD)" ]]; then
              echo "GitHub main mirrors release metadata SHA"
              break
            fi

            if [[ "${attempt}" == "30" ]]; then
              echo "GitHub main did not mirror release metadata SHA from Forgejo after ${attempt} attempts." >&2
              echo "Refusing to push release metadata directly to GitHub main." >&2
              exit 1
            fi

            echo "Waiting for GitHub main mirror to receive release metadata SHA; attempt ${attempt}/30"
            sleep 10
          done

          git fetch --force origin main
          git fetch --force github main

          head_sha="$(git rev-parse HEAD)"
          origin_sha="$(git rev-parse origin/main)"
          github_sha="$(git rev-parse github/main)"

          echo "Release metadata SHA: ${head_sha}"
          echo "Forgejo main: ${origin_sha}"
          echo "GitHub main: ${github_sha}"

          test "${origin_sha}" = "${head_sha}"
          test "${github_sha}" = "${head_sha}"

      - name: Build runtime package chain
        run: |
          set -euo pipefail
          pnpm --filter @bilig/protocol build
          pnpm --filter @bilig/workbook-domain build
          pnpm --filter @bilig/wasm-kernel build
          pnpm --filter @bilig/formula build
          pnpm --filter @bilig/core build
          pnpm --filter @bilig/excel-import build
          pnpm --filter @bilig/headless build
          pnpm --filter bilig-workpaper build
          pnpm --filter @bilig/workpaper build
          pnpm --filter xlsx-formula-recalc build
          pnpm --filter @bilig/xlsx-formula-recalc build
          pnpm --filter sheetjs-formula-recalc build
          pnpm --filter @bilig/sheetjs-formula-recalc build
          pnpm --filter exceljs-formula-recalc build
          pnpm --filter @bilig/exceljs-formula-recalc build

      - name: Validate publishable runtime package set
        run: |
          set -euo pipefail
          pnpm publish:runtime:check

      - name: Check npm package name provisioning
        id: npm_provisioning
        env:
          ALLOW_NEW_NPM_PACKAGES: ${{ needs.plan_release.outputs.allow_new_packages }}
          SKIP_UNPROVISIONED_NPM_PACKAGES: ${{ needs.plan_release.outputs.skip_unprovisioned_packages }}
          DRY_RUN: ${{ needs.plan_release.outputs.dry_run }}
        run: |
          set -euo pipefail
          bun scripts/check-runtime-npm-provisioning.ts

      - name: Report skipped runtime package release
        if: steps.npm_provisioning.outputs.publish_allowed != 'true'
        env:
          REASON: ${{ steps.npm_provisioning.outputs.reason }}
          MISSING_PACKAGES: ${{ steps.npm_provisioning.outputs.missing_packages }}
          PUBLISHED_VERSIONS: ${{ steps.npm_provisioning.outputs.published_versions }}
        run: |
          set -euo pipefail
          {
            echo "### runtime npm release skipped"
            echo
            echo "${REASON}"
            echo
            echo "missing package names: ${MISSING_PACKAGES}"
            echo
            echo "published versions: ${PUBLISHED_VERSIONS}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Inspect runtime tag state
        if: steps.npm_provisioning.outputs.publish_allowed == 'true'
        id: tag_state
        env:
          TAG_NAME: ${{ needs.plan_release.outputs.tag_name }}
        run: |
          set -euo pipefail

          origin_tag="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" | awk '{print $1}')"
          github_tag="$(git ls-remote --tags github "refs/tags/${TAG_NAME}" | awk '{print $1}')"

          if [[ -n "${origin_tag}" || -n "${github_tag}" ]]; then
            if [[ -z "${origin_tag}" || -z "${github_tag}" ]]; then
              echo "Runtime tag ${TAG_NAME} exists on only one remote" >&2
              exit 1
            fi
            if [[ "${origin_tag}" != "${github_tag}" ]]; then
              echo "Runtime tag ${TAG_NAME} disagrees between Forgejo and GitHub" >&2
              exit 1
            fi
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=${origin_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create and push authoritative runtime tag
        if: steps.npm_provisioning.outputs.publish_allowed == 'true' && steps.tag_state.outputs.exists != 'true' && needs.plan_release.outputs.dry_run != 'true'
        env:
          TAG_NAME: ${{ needs.plan_release.outputs.tag_name }}
          TARGET_VERSION: ${{ needs.plan_release.outputs.target_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG_NAME}" -m "Libraries v${TARGET_VERSION}" HEAD
          SKIP_SIMPLE_GIT_HOOKS=1 git push origin "refs/tags/${TAG_NAME}"

          tag_sha="$(git rev-parse "refs/tags/${TAG_NAME}")"
          for attempt in $(seq 1 30); do
            github_tag="$(git ls-remote --tags github "refs/tags/${TAG_NAME}" | awk '{print $1}')"
            if [[ "${github_tag}" == "${tag_sha}" ]]; then
              echo "GitHub tag mirror has ${TAG_NAME}"
              exit 0
            fi

            if [[ "${attempt}" == "30" ]]; then
              echo "GitHub tag mirror did not receive ${TAG_NAME} from Forgejo after ${attempt} attempts." >&2
              echo "Refusing to push runtime tags directly to GitHub." >&2
              exit 1
            fi

            echo "Waiting for GitHub tag mirror to receive ${TAG_NAME}; attempt ${attempt}/30"
            sleep 10
          done

      - name: Create GitHub release
        if: steps.npm_provisioning.outputs.publish_allowed == 'true' && needs.plan_release.outputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.plan_release.outputs.tag_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG_NAME} already exists; skipping creation"
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --verify-tag \
            --title "Libraries v${{ needs.plan_release.outputs.target_version }}" \
            --notes-file build/runtime-release-notes.md

      - name: Publish runtime package set to npm
        if: steps.npm_provisioning.outputs.publish_allowed == 'true'
        env:
          NPM_DIST_TAG: ${{ needs.plan_release.outputs.npm_tag }}
          DRY_RUN: ${{ needs.plan_release.outputs.dry_run }}
          ALLOW_NEW_NPM_PACKAGES: ${{ needs.plan_release.outputs.allow_new_packages }}
          SKIP_UNPROVISIONED_NPM_PACKAGES: ${{ needs.plan_release.outputs.skip_unprovisioned_packages }}
          TARGET_VERSION: ${{ needs.plan_release.outputs.target_version }}
        run: |
          set -euo pipefail
          bun scripts/publish-runtime-package-set.ts

      - name: Upload WorkPaper MCPB release asset
        if: steps.npm_provisioning.outputs.publish_allowed == 'true' && needs.plan_release.outputs.dry_run != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.plan_release.outputs.tag_name }}
          TARGET_VERSION: ${{ needs.plan_release.outputs.target_version }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            if npm view "@bilig/headless@${TARGET_VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" == "30" ]]; then
              echo "@bilig/headless@${TARGET_VERSION} was not visible on npm after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Waiting for @bilig/headless@${TARGET_VERSION} to become visible on npm; attempt ${attempt}/30"
            sleep 10
          done

          pnpm mcpb:workpaper:build -- --package-version "${TARGET_VERSION}"
          (cd build/mcpb && shasum -a 256 bilig-workpaper.mcpb > bilig-workpaper.mcpb.sha256)
          gh release upload "${TAG_NAME}" \
            build/mcpb/bilig-workpaper.mcpb \
            build/mcpb/bilig-workpaper.mcpb.sha256 \
            --clobber

  publish_n8n_node:
    name: publish-n8n-workpaper-node
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.publish_n8n_node == 'true'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24.11.1'
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing
        run: |
          set -euo pipefail
          required_npm_version="11.9.0"
          current_npm_version="$(npm --version)"

          if node - "$current_npm_version" "$required_npm_version" <<'NODE'
          const [current, required] = process.argv.slice(2);
          const parse = (version) => version.split('.').map((part) => Number.parseInt(part, 10));
          const [currentMajor, currentMinor, currentPatch] = parse(current);
          const [requiredMajor, requiredMinor, requiredPatch] = parse(required);
          const currentParts = [currentMajor, currentMinor, currentPatch];
          const requiredParts = [requiredMajor, requiredMinor, requiredPatch];
          for (let index = 0; index < requiredParts.length; index += 1) {
            if (currentParts[index] > requiredParts[index]) {
              process.exit(0);
            }
            if (currentParts[index] < requiredParts[index]) {
              process.exit(1);
            }
          }
          process.exit(0);
          NODE
          then
            echo "npm ${current_npm_version} satisfies trusted publishing minimum ${required_npm_version}"
          else
            echo "npm ${current_npm_version} is below trusted publishing minimum ${required_npm_version}; installing ${required_npm_version}"
            npm config set fetch-retries 5
            npm config set fetch-retry-factor 2
            npm config set fetch-retry-mintimeout 20000
            npm config set fetch-retry-maxtimeout 120000
            npm install -g "npm@${required_npm_version}"
          fi

          npm --version

      - name: Install n8n node dependencies
        run: |
          set -euo pipefail
          cd integrations/n8n-nodes-workpaper
          npm ci

      - name: Check n8n node package
        run: |
          set -euo pipefail
          cd integrations/n8n-nodes-workpaper
          npm run check

      - name: Inspect n8n node package version
        id: n8n_package
        run: |
          set -euo pipefail
          package_name="$(node -e "const fs = require('node:fs'); process.stdout.write(JSON.parse(fs.readFileSync('integrations/n8n-nodes-workpaper/package.json', 'utf8')).name)")"
          package_version="$(node -e "const fs = require('node:fs'); process.stdout.write(JSON.parse(fs.readFileSync('integrations/n8n-nodes-workpaper/package.json', 'utf8')).version)")"
          {
            echo "name=${package_name}"
            echo "version=${package_version}"
          } >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is not published yet"
          fi

      - name: Publish n8n community node
        if: steps.n8n_package.outputs.already_published != 'true'
        env:
          NPM_DIST_TAG: ${{ github.event.inputs.npm_tag || 'latest' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          cd integrations/n8n-nodes-workpaper

          publish_args=(--access public --tag "${NPM_DIST_TAG}" --provenance)
          if [[ "${DRY_RUN}" == "true" ]]; then
            publish_args+=(--dry-run)
          fi

          unset NODE_AUTH_TOKEN
          npm publish "${publish_args[@]}"

      - name: Verify n8n community node is visible on npm
        if: steps.n8n_package.outputs.already_published != 'true' && github.event.inputs.dry_run != 'true'
        env:
          PACKAGE_NAME: ${{ steps.n8n_package.outputs.name }}
          PACKAGE_VERSION: ${{ steps.n8n_package.outputs.version }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is visible on npm"
              exit 0
            fi

            echo "Waiting for ${PACKAGE_NAME}@${PACKAGE_VERSION} to become visible on npm; attempt ${attempt}/30"
            sleep 10
          done

          echo "${PACKAGE_NAME}@${PACKAGE_VERSION} was not visible on npm after 30 attempts" >&2
          exit 1

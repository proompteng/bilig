name: headless-package

on:
  push:
    branches:
      - main
    paths:
      - "packages/headless/**"
      - "packages/core/**"
      - "packages/formula/**"
      - "packages/protocol/**"
      - "docs/public-api.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "tsconfig.json"
      - "tsconfig.workspace-paths.json"
      - "workspace-resolution.generated.json"
      - ".github/workflows/headless-package.yml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - "packages/headless/CHANGELOG.md"
  pull_request:
    paths:
      - "packages/headless/**"
      - "packages/core/**"
      - "packages/formula/**"
      - "packages/protocol/**"
      - "docs/public-api.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "tsconfig.json"
      - "tsconfig.workspace-paths.json"
      - "workspace-resolution.generated.json"
      - ".github/workflows/headless-package.yml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - "packages/headless/CHANGELOG.md"
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag (latest, beta, next, etc.)"
        type: string
        required: false
        default: latest
      dry_run:
        description: "Run npm publish in dry-run mode instead of releasing"
        type: boolean
        required: false
        default: false
      release_mode:
        description: "prepare → open release PR, publish → release to npm"
        type: choice
        default: prepare
        options:
          - prepare
          - publish

concurrency:
  group: headless-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify-headless
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.1"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Check workspace resolution metadata
        run: |
          set -euo pipefail
          pnpm workspace-resolution:check

      - name: Lint headless sources
        run: |
          set -euo pipefail
          pnpm exec oxlint --config .oxlintrc.json --type-aware --deny-warnings packages/headless/src

      - name: Run headless parity tests
        run: |
          set -euo pipefail
          pnpm exec vitest run \
            packages/headless/src/__tests__/headless-workbook.test.ts \
            packages/headless/src/__tests__/headless-workbook-parity.test.ts

      - name: Build headless dependency chain
        run: |
          set -euo pipefail
          pnpm --filter @bilig/formula build
          pnpm --filter @bilig/core build
          pnpm --filter @bilig/headless build

      - name: Pack headless tarball
        run: |
          set -euo pipefail
          rm -rf build/npm-packages-headless
          mkdir -p build/npm-packages-headless
          pnpm --filter @bilig/headless pack --pack-destination build/npm-packages-headless

      - name: Upload packed headless artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilig-headless-package
          path: build/npm-packages-headless/*.tgz
          if-no-files-found: error

  prepare-release:
    name: prepare-headless-release
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'prepare' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.1"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Run release-please for headless package
        id: release_please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          include-component-in-tag: true
          skip-github-release: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release branch
        id: release_branch
        run: |
          set -euo pipefail
          branch="release-please--branches--main--components--headless"
          if git ls-remote --exit-code origin "$branch" >/dev/null 2>&1; then
            git fetch origin "$branch":"$branch"
            git checkout "$branch"
            echo "branch=$branch" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "release-please branch $branch not found; nothing to build yet"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build generated release branch
        if: steps.release_branch.outputs.found == 'true'
        run: |
          set -euo pipefail
          pnpm --filter @bilig/formula build
          pnpm --filter @bilig/core build
          pnpm --filter @bilig/headless build

  publish-release:
    name: publish-headless
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_mode == 'publish' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24.11.1"
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: |
          set -euo pipefail
          npm install -g npm@11.5.1
          npm --version

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          test "$(pnpm --version)" = "10.32.1"

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Derive release metadata
        id: release_meta
        run: |
          set -euo pipefail
          version_value=$(node -p "require('./packages/headless/package.json').version")
          npm_tag_input="${{ github.event.inputs.npm_tag || 'latest' }}"
          dry_run_input="${{ github.event.inputs.dry_run || 'false' }}"

          case "$dry_run_input" in
            true|True|TRUE) dry_run_value=true ;;
            false|False|FALSE|"") dry_run_value=false ;;
            *)
              echo 'dry_run input must be true or false' >&2
              exit 1
              ;;
          esac

          echo "version=$version_value" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag_input" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run_value" >> "$GITHUB_OUTPUT"

      - name: Confirm package version
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(
            fs.readFileSync('packages/headless/package.json', 'utf8'),
          );
          console.log(`Publishing @bilig/headless v${pkg.version}`);
          NODE

      - name: Build headless dependency chain
        run: |
          set -euo pipefail
          pnpm --filter @bilig/formula build
          pnpm --filter @bilig/core build
          pnpm --filter @bilig/headless build

      - name: Pack headless tarball
        run: |
          set -euo pipefail
          rm -rf build/npm-packages-headless
          mkdir -p build/npm-packages-headless
          pnpm --filter @bilig/headless pack --pack-destination build/npm-packages-headless

      - name: Publish package to npm
        env:
          NPM_DIST_TAG: ${{ steps.release_meta.outputs.npm_tag }}
          DRY_RUN: ${{ steps.release_meta.outputs.dry_run }}
        run: |
          set -euo pipefail
          tarball_path=$(find build/npm-packages-headless -maxdepth 1 -name '*.tgz' -print -quit)
          if [[ -z "${tarball_path}" ]]; then
            echo 'Packed headless tarball not found' >&2
            exit 1
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo 'Running npm publish in dry-run mode'
            npm publish "$tarball_path" --tag "$NPM_DIST_TAG" --access public --provenance --dry-run
          else
            npm publish "$tarball_path" --tag "$NPM_DIST_TAG" --access public --provenance
          fi
